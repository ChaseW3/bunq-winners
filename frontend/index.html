<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>bunq Voice</title>
  <style>
    :root {
      --cyan: #00C8FF;
      --magenta: #FF3D8B;
      --deep: #1A2B5C;
      --bg: #0A0A0A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: #fff;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    body { display: flex; flex-direction: column; }

    #stage {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #orb-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #hint {
      position: relative;
      margin-top: 240px;
      font-size: 15px;
      color: #555;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.3s, opacity 0.3s;
      z-index: 1;
    }

    #stage.listening #hint { color: var(--magenta); }
    #stage.thinking #hint  { color: var(--cyan); }
    #stage.speaking #hint  { color: #fff; }

    #output {
      padding: 24px 28px 32px;
      min-height: 120px;
      max-height: 38dvh;
      overflow-y: auto;
      border-top: 1px solid #1a1a1a;
      background: #050505;
    }

    #transcript {
      font-size: 18px;
      line-height: 1.55;
      color: #e5e7eb;
    }

    #transcript.placeholder { color: #333; font-size: 15px; }

    .you {
      color: #888;
      font-size: 14px;
      margin-bottom: 8px;
      font-style: italic;
    }

    .reply {
      color: #fff;
      font-size: 19px;
      line-height: 1.5;
    }

    .tool-calls {
      margin-top: 16px;
      border-top: 1px solid #1a1a1a;
      padding-top: 14px;
    }

    .tool-call {
      background: #0f1419;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .tool-call .name { color: var(--cyan); font-weight: 600; }
    .tool-call.error .name { color: #f87171; }
    .tool-call .args { color: #9ca3af; }
    .tool-call .result {
      color: #d1d5db;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed #1f2937;
      word-break: break-word;
    }
    .tool-call .arrow { color: #4b5563; margin: 0 4px; }
  </style>
</head>
<body>

  <div id="stage">
    <canvas id="orb-canvas"></canvas>
    <div id="hint">Hold to speak</div>
  </div>

  <div id="output">
    <div id="transcript" class="placeholder">Your words will appear here...</div>
  </div>

  <script>
    const BACKEND = 'http://localhost:8000';
    const stage = document.getElementById('stage');
    const hint = document.getElementById('hint');
    const transcript = document.getElementById('transcript');
    const canvas = document.getElementById('orb-canvas');
    const ctx = canvas.getContext('2d');

    // ---------- state ----------
    let appState = 'idle'; // idle | listening | thinking | speaking
    let pressStartedAt = 0;
    let recorder = null;
    let micStream = null;
    let audioCtx = null;
    let analyser = null;
    let micLevel = 0;
    let chunks = [];
    let abortCtrl = null;
    let speakingTimer = null;
    const MIN_HOLD_MS = 200;

    // ---------- ElevenLabs TTS ----------
    const ELEVENLABS_VOICE_ID = 'gE0owC0H9C8SzfDyIUtB';
    let elevenLabsApiKey = '';
    let ttsAudio = null;

    fetch(`${BACKEND}/config`)
      .then(r => r.json())
      .then(cfg => { elevenLabsApiKey = cfg.elevenlabs_api_key; })
      .catch(() => {});

    function setState(s) {
      appState = s;
      stage.classList.toggle('listening', s === 'listening');
      stage.classList.toggle('thinking',  s === 'thinking');
      stage.classList.toggle('speaking',  s === 'speaking');
      hint.textContent = ({
        idle:      'Hold to speak',
        listening: 'Listening…',
        thinking:  'Thinking…',
        speaking:  'Tap to interrupt',
      })[s];
    }

    // ---------- particles ----------
    const N = 110;
    const particles = [];
    for (let i = 0; i < N; i++) {
      const u = Math.random(), v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      particles.push({
        x: Math.sin(phi) * Math.cos(theta),
        y: Math.sin(phi) * Math.sin(theta),
        z: Math.cos(phi),
        phase: Math.random() * Math.PI * 2,
      });
    }

    let W = 0, H = 0, DPR = 1;
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = stage.clientWidth;
      H = stage.clientHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);

    function lerp(a, b, t) { return a + (b - a) * t; }
    function lerpColor(c1, c2, t) {
      return [
        Math.round(lerp(c1[0], c2[0], t)),
        Math.round(lerp(c1[1], c2[1], t)),
        Math.round(lerp(c1[2], c2[2], t)),
      ];
    }
    const CYAN    = [0, 200, 255];
    const MAGENTA = [255, 61, 139];
    const DEEP    = [26, 43, 92];

    let yaw = 0;
    const pitch = 0.3;

    function draw(t) {
      requestAnimationFrame(draw);
      const time = t * 0.001;

      let rotSpeed = 0.15;
      if (appState === 'listening') rotSpeed = 0.25;
      if (appState === 'thinking')  rotSpeed = 0.6;
      if (appState === 'speaking')  rotSpeed = 0.35;
      yaw += rotSpeed * 0.016;

      ctx.clearRect(0, 0, W, H);

      const cx = W / 2, cy = H / 2;
      const baseSize = Math.min(W, H) * 0.22;

      const bloomR = baseSize * 2.4;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, bloomR);
      grad.addColorStop(0, `rgba(${DEEP.join(',')},0.55)`);
      grad.addColorStop(1, 'rgba(26,43,92,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      const pushBase   = appState === 'listening' ? micLevel * 0.6 : 0;
      const pulseSpeak = appState === 'speaking'  ? 0.18 * Math.sin(time * 2 * Math.PI * 1.6) : 0;
      const breath     = appState === 'idle' ? 0.04 : (appState === 'thinking' ? 0.08 : 0.0);

      const cosY = Math.cos(yaw),  sinY = Math.sin(yaw);
      const cosX = Math.cos(pitch), sinX = Math.sin(pitch);
      const projected = particles.map(p => {
        let r = 1.0 + breath * Math.sin(time * (appState === 'thinking' ? 3 : 1) + p.phase);
        r += pushBase * (0.7 + 0.3 * Math.sin(p.phase + time * 4));
        r += pulseSpeak;
        const x = p.x * r, y = p.y * r, z = p.z * r;
        const x1 = x * cosY + z * sinY;
        const z1 = -x * sinY + z * cosY;
        const y1 = y * cosX - z1 * sinX;
        const z2 = y * sinX + z1 * cosX;
        const focal = 3.2;
        const scale = focal / (focal + z2);
        return {
          sx: cx + x1 * baseSize * scale,
          sy: cy + y1 * baseSize * scale,
          z: z2,
          scale,
        };
      });
      projected.sort((a, b) => a.z - b.z);

      const intensity = appState === 'thinking'  ? 1.0
                      : appState === 'speaking'  ? 0.95
                      : appState === 'listening' ? 0.9
                      : 0.7;

      for (const p of projected) {
        const tDepth = (p.z + 1) / 2;
        const magBias = appState === 'listening' ? Math.min(1, micLevel * 1.2) : 0;
        const colorT = Math.min(1, tDepth * 0.7 + 0.15 + magBias * 0.4);
        const [r, g, b] = lerpColor(CYAN, MAGENTA, colorT);
        const alpha = (0.25 + 0.75 * tDepth) * intensity;
        const radius = (1.6 + 2.6 * tDepth) * p.scale;

        ctx.beginPath();
        ctx.arc(p.sx, p.sy, radius * 3.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.12})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p.sx, p.sy, radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fill();
      }
    }

    requestAnimationFrame(draw);
    resize();

    // ---------- mic level ----------
    function startMicAnalyser(stream) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const src = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      src.connect(analyser);
      const buf = new Uint8Array(analyser.frequencyBinCount);
      function tick() {
        if (!analyser) return;
        analyser.getByteFrequencyData(buf);
        let sum = 0;
        for (let i = 0; i < buf.length; i++) sum += buf[i];
        const avg = sum / buf.length / 255;
        micLevel = micLevel * 0.8 + avg * 0.2;
        requestAnimationFrame(tick);
      }
      tick();
    }

    function teardownMic() {
      if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
      }
      if (audioCtx) {
        try { audioCtx.close(); } catch {}
        audioCtx = null;
      }
      analyser = null;
      micLevel = 0;
    }

    // ---------- TTS ----------
    async function speakReply(text) {
      if (!text || !elevenLabsApiKey) return;
      try {
        const resp = await fetch(
          `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`,
          {
            method: 'POST',
            headers: { 'xi-api-key': elevenLabsApiKey, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              text,
              model_id: 'eleven_multilingual_v2',
              voice_settings: { stability: 0.5, similarity_boost: 0.75 }
            })
          }
        );
        if (!resp.ok) { console.warn('ElevenLabs TTS failed:', resp.status); return; }
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        if (ttsAudio) { try { ttsAudio.pause(); } catch {} }
        ttsAudio = new Audio(url);
        ttsAudio.onended = () => URL.revokeObjectURL(url);
        await ttsAudio.play();
      } catch (e) {
        console.warn('ElevenLabs TTS error:', e);
      }
    }

    function stopTts() {
      if (ttsAudio) { try { ttsAudio.pause(); } catch {} ttsAudio = null; }
    }

    // ---------- recording / network ----------
    async function startRecording() {
      try {
        if (!audioCtx) audioCtx = new AudioContext();
        chunks = [];
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(micStream);
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = onRecorderStop;
        recorder.start();
        startMicAnalyser(micStream);
        setState('listening');
        pressStartedAt = performance.now();
      } catch (e) {
        showError('Mic access denied — check browser permissions.');
        setState('idle');
      }
    }

    function endRecordingAndSend() {
      const heldFor = performance.now() - pressStartedAt;
      if (heldFor < MIN_HOLD_MS) {
        // accidental tap — discard
        if (recorder && recorder.state !== 'inactive') {
          try { recorder.onstop = null; recorder.stop(); } catch {}
        }
        recorder = null;
        teardownMic();
        setState('idle');
        return;
      }
      if (recorder && recorder.state !== 'inactive') {
        try { recorder.stop(); } catch {}
      }
      teardownMic();
      setState('thinking');
    }

    function onRecorderStop() {
      if (appState !== 'thinking') return;
      sendAudio();
    }

    async function sendAudio() {
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const form = new FormData();
      form.append('audio', blob, 'recording.webm');
      abortCtrl = new AbortController();
      try {
        const resp = await fetch(`${BACKEND}/voice`, {
          method: 'POST',
          body: form,
          signal: abortCtrl.signal,
        });
        const data = await resp.json();
        if (appState !== 'thinking') return;
        renderResult(data);
        if (data.reply_text) speakReply(data.reply_text);
        startSpeaking(data.reply_text || '');
      } catch (e) {
        if (e.name === 'AbortError') return;
        showError('Could not reach backend.');
        setState('idle');
      } finally {
        abortCtrl = null;
      }
    }

    function startSpeaking(text) {
      const ms = Math.min(8000, Math.max(1200, text.length * 50));
      setState('speaking');
      clearTimeout(speakingTimer);
      speakingTimer = setTimeout(() => {
        if (appState === 'speaking') setState('idle');
      }, ms);
    }

    function interrupt() {
      if (abortCtrl) { try { abortCtrl.abort(); } catch {} abortCtrl = null; }
      stopTts();
      clearTimeout(speakingTimer);
      if (recorder && recorder.state !== 'inactive') {
        try { recorder.onstop = null; recorder.stop(); } catch {}
      }
      recorder = null;
      teardownMic();
    }

    // ---------- pointer ----------
    stage.addEventListener('pointerdown', async e => {
      e.preventDefault();
      try { stage.setPointerCapture(e.pointerId); } catch {}
      if (appState === 'idle') {
        await startRecording();
      } else if (appState === 'thinking' || appState === 'speaking') {
        interrupt();
        await startRecording();
      }
    });

    function onRelease(e) {
      try { stage.releasePointerCapture(e.pointerId); } catch {}
      if (appState === 'listening') endRecordingAndSend();
    }
    stage.addEventListener('pointerup', onRelease);
    stage.addEventListener('pointercancel', onRelease);

    // ---------- render ----------
    function renderResult(data) {
      transcript.className = '';
      if (data.error) {
        transcript.innerHTML = `<div class="reply">⚠️ ${escapeHtml(data.error)}</div>`;
        return;
      }
      if (!data.reply_text && !data.user_text) {
        transcript.innerHTML = `<div class="reply">(nothing heard — try again)</div>`;
        return;
      }
      let html =
        (data.user_text ? `<div class="you">"${escapeHtml(data.user_text)}"</div>` : '') +
        `<div class="reply">${escapeHtml(data.reply_text || '')}</div>`;

      if (data.tool_calls && data.tool_calls.length > 0) {
        html += '<div class="tool-calls">';
        for (const tc of data.tool_calls) {
          const argsStr = Object.keys(tc.input).length
            ? `(${Object.entries(tc.input).map(([k, v]) =>
                `${k}=${typeof v === 'string' ? `"${v}"` : JSON.stringify(v)}`
              ).join(', ')})`
            : '()';
          const resultStr = typeof tc.result === 'string'
            ? tc.result
            : JSON.stringify(tc.result);
          html += `<div class="tool-call${tc.is_error ? ' error' : ''}">
            <span class="name">${escapeHtml(tc.name)}</span><span class="args">${escapeHtml(argsStr)}</span>
            <div class="result"><span class="arrow">→</span>${escapeHtml(resultStr)}</div>
          </div>`;
        }
        html += '</div>';
      }
      transcript.innerHTML = html;
    }

    function showError(msg) {
      transcript.className = '';
      transcript.textContent = '⚠️ ' + msg;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
  </script>
</body>
</html>
