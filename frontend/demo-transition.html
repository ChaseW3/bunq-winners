<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bunq Voice Transition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: calc(33vw - 210px);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .phone {
      position: relative;
      width: 420px;
      height: 900px;
      border-radius: 62px;
      background: #1a1a1a;
      box-shadow:
        0 0 0 2px #3a3a3a,
        0 0 0 6px #222,
        0 0 0 8px #444,
        0 40px 100px rgba(0,0,0,0.9),
        inset 0 0 0 2px #2a2a2a;
    }

    .phone::before {
      content: '';
      position: absolute;
      left: -12px; top: 140px;
      width: 5px; height: 42px;
      background: #333;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 58px 0 #333, 0 112px 0 #333;
    }
    .phone::after {
      content: '';
      position: absolute;
      right: -12px; top: 190px;
      width: 5px; height: 72px;
      background: #333;
      border-radius: 0 2px 2px 0;
    }

    .screen {
      position: absolute;
      inset: 10px;
      border-radius: 54px;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    /* ── Screenshot: transitions from sharp to blurred ── */
    .bg-screenshot {
      position: absolute;
      inset: 0;
      background-image: url('/picture/Frontend.jpeg');
      background-size: cover;
      background-position: top center;
      filter: blur(0px);
      transform: scale(1);
      transition: filter 0.7s ease, transform 0.7s ease;
    }

    .screen.blurred .bg-screenshot {
      filter: blur(10px);
      transform: scale(1.08);
    }

    /* ── Dark tint: fades in on blur ── */
    .bg-tint {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .screen.blurred .bg-tint {
      opacity: 1;
    }

    /* ── Dynamic Island ── */
    .island {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }

    /* ── Voice UI: fades in ── */
    .voice-ui {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.6s ease 0.3s;
    }

    .screen.active .voice-ui {
      opacity: 1;
    }

    .orb {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #00C8FF, #7c3aed);
      box-shadow:
        0 0 50px rgba(0, 200, 255, 0.55),
        0 0 100px rgba(124, 58, 237, 0.35);
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }

    .hint {
      margin-top: 20px;
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Lock Screen Overlay ── */
    .lock-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 54px;
      transition: opacity 0.5s ease;
    }

    .lock-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .lock-icon {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .lock-icon svg {
      width: 28px;
      height: 28px;
      fill: rgba(255,255,255,0.5);
    }

    .lock-text {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 0 40px;
    }

    .lock-dots {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .lock-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .lock-dot.active {
      background: #00C8FF;
      transform: scale(1.3);
    }

    .lock-dot.error {
      background: #EF4444;
    }

    .lock-dot.success {
      background: #22C55E;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .lock-dots.shake {
      animation: shake 0.4s ease;
    }

    /* ── Home bar ── */
    .home-bar {
      position: absolute;
      bottom: 12px;
      left: 50%; transform: translateX(-50%);
      width: 120px; height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      z-index: 10;
    }

    /* ── Accessibility Log Panel ── */
    .a11y-log {
      position: fixed;
      top: 40px;
      right: 40px;
      bottom: 40px;
      width: 38vw;
      background: #0a0a0a;
      border: 1px solid #1f2937;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
      pointer-events: none;
      overflow: hidden;
      font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace;
    }

    .a11y-log.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .a11y-log-header {
      padding: 16px 20px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #1f2937;
      flex-shrink: 0;
    }

    .a11y-log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .a11y-entry {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      font-size: 12.5px;
      line-height: 1.5;
      animation: fadeInEntry 0.3s ease;
    }

    @keyframes fadeInEntry {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .a11y-tag {
      flex-shrink: 0;
      font-weight: 700;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      height: fit-content;
    }

    .a11y-tag.AUDIO   { color: #00C8FF; background: rgba(0,200,255,0.1); }
    .a11y-tag.EARCON  { color: #FF3D8B; background: rgba(255,61,139,0.1); }
    .a11y-tag.SPEECH  { color: #4ADE80; background: rgba(74,222,128,0.1); }
    .a11y-tag.STATE   { color: #FACC15; background: rgba(250,204,21,0.1); }
    .a11y-tag.ACTION  { color: #22C55E; background: rgba(34,197,94,0.1); }
    .a11y-tag.ERROR   { color: #EF4444; background: rgba(239,68,68,0.1); }

    .a11y-event {
      color: #9ca3af;
      font-weight: 600;
      flex-shrink: 0;
    }

    .a11y-detail {
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div class="phone">
    <div class="screen" id="screen">
      <div class="bg-screenshot"></div>
      <div class="bg-tint"></div>
      <div class="island"></div>
      <div class="lock-overlay" id="lockOverlay">
        <div class="lock-icon">
          <svg viewBox="0 0 24 24"><path d="M12 17a2 2 0 002-2 2 2 0 00-2-2 2 2 0 00-2 2 2 2 0 002 2m6-9a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V10a2 2 0 012-2h1V6a5 5 0 0110 0v2h1m-6-2v2h4V6a2 2 0 00-2-2 2 2 0 00-2 2z"/></svg>
        </div>
        <div class="lock-text">Tap your rhythm to unlock</div>
        <div class="lock-dots" id="lockDots">
          <div class="lock-dot"></div>
          <div class="lock-dot"></div>
          <div class="lock-dot"></div>
          <div class="lock-dot"></div>
        </div>
      </div>
      <div class="voice-ui">
        <div class="orb"></div>
        <div class="hint">Hold to speak</div>
      </div>
      <div class="home-bar"></div>
    </div>
  </div>

  <div class="a11y-log" id="a11yLog">
    <div class="a11y-log-header">Accessibility Events</div>
    <div class="a11y-log-entries" id="a11yEntries"></div>
  </div>

  <script>
// ── Earcon System ──
const EarconSystem = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function play(name) {
    const ac = getCtx();
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);

    switch (name) {
      case 'greeting': {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.linearRampToValueAtTime(784, now + 0.3);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.5);
        osc.start(now);
        osc.stop(now + 0.5);
        break;
      }
      case 'mic-on': {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
        break;
      }
      case 'mic-off': {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.12);
        osc.start(now);
        osc.stop(now + 0.12);
        break;
      }
      case 'thinking': {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        gain.gain.setValueAtTime(0.08, now);
        for (let i = 0; i < 8; i++) {
          const t = now + i * 0.5;
          gain.gain.linearRampToValueAtTime(0.08, t);
          gain.gain.linearRampToValueAtTime(0.02, t + 0.25);
        }
        gain.gain.linearRampToValueAtTime(0, now + 4);
        osc.start(now);
        osc.stop(now + 4);
        return osc;
      }
      case 'success': {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(659, now);
        osc.frequency.setValueAtTime(880, now + 0.15);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.45);
        osc.start(now);
        osc.stop(now + 0.45);
        break;
      }
      case 'error': {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, now);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
        break;
      }
      case 'tap': {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
        break;
      }
      case 'unlock': {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.12);
        osc.frequency.setValueAtTime(784, now + 0.24);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.5);
        osc.start(now);
        osc.stop(now + 0.5);
        break;
      }
    }
    return osc;
  }

  return { play, getCtx };
})();

let thinkingOsc = null;
function stopThinkingEarcon() {
  if (thinkingOsc) {
    try { thinkingOsc.stop(); } catch {}
    thinkingOsc = null;
  }
}
  </script>

  <script>
const A11yLog = (() => {
  const entries = document.getElementById('a11yEntries');
  const panel = document.getElementById('a11yLog');

  function show() { panel.classList.add('visible'); }
  function hide() { panel.classList.remove('visible'); }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function log(type, event, detail) {
    const entry = document.createElement('div');
    entry.className = 'a11y-entry';
    entry.innerHTML =
      `<span class="a11y-tag ${type}">${type}</span>` +
      `<span class="a11y-event">${escapeHtml(event)}</span>` +
      `<span class="a11y-detail">${escapeHtml(detail)}</span>`;
    entries.appendChild(entry);
    entries.scrollTop = entries.scrollHeight;
  }

  function logBackendEvents(events) {
    if (!events) return;
    for (const ev of events) {
      log(ev.type, ev.event, ev.detail);
    }
  }

  return { show, hide, log, logBackendEvents };
})();
  </script>

  <script>
  // ── Config ──
  const BACKEND = 'http://localhost:8000';
  const ELEVENLABS_VOICE_ID = 'gE0owC0H9C8SzfDyIUtB';
  let elevenLabsApiKey = '';

  fetch(`${BACKEND}/config`)
    .then(r => r.json())
    .then(cfg => { elevenLabsApiKey = cfg.elevenlabs_api_key; })
    .catch(() => {});

  // ── TTS ──
  let ttsAudio = null;

  async function speakText(text) {
    if (!text || !elevenLabsApiKey) return null;
    try {
      const resp = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`,
        {
          method: 'POST',
          headers: { 'xi-api-key': elevenLabsApiKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            model_id: 'eleven_multilingual_v2',
            voice_settings: { stability: 0.5, similarity_boost: 0.75 }
          })
        }
      );
      if (!resp.ok) { console.warn('ElevenLabs TTS failed:', resp.status); return null; }
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      if (ttsAudio) { try { ttsAudio.pause(); } catch {} }
      ttsAudio = new Audio(url);
      ttsAudio.onended = () => { URL.revokeObjectURL(url); };
      await ttsAudio.play();
      return ttsAudio;
    } catch (e) {
      console.warn('TTS error:', e);
      A11yLog.log('ERROR', 'tts-failed', `TTS error: ${e.message || e}`);
      return null;
    }
  }

  function stopTts() {
    if (ttsAudio) { try { ttsAudio.pause(); } catch {} ttsAudio = null; }
  }

  // ── Auto-Greeting + Guided Tour ──
  let tourRunning = false;

  async function waitForTts(text) {
    setVoiceState('speaking');
    const audio = await speakText(text);
    if (audio) {
      await new Promise(resolve => { audio.onended = resolve; });
    } else {
      await new Promise(r => setTimeout(r, Math.max(1500, text.length * 55)));
    }
  }

  async function sendTextAndSpeak(userMessage) {
    A11yLog.log('AUDIO', 'tour-prompt', `Demo: "${userMessage}"`);
    setVoiceState('thinking');
    thinkingOsc = EarconSystem.play('thinking');
    A11yLog.log('STATE', 'thinking', 'Lynn is processing the request');

    const form = new FormData();
    form.append('message', userMessage);
    try {
      const resp = await fetch(`${BACKEND}/text`, { method: 'POST', body: form });
      const data = await resp.json();
      console.log('Tour response:', data);
      stopThinkingEarcon();

      // Log tool calls
      if (data.tool_calls && data.tool_calls.length > 0) {
        for (const tc of data.tool_calls) {
          const argsStr = Object.keys(tc.input || {}).length
            ? `(${Object.entries(tc.input).map(([k,v]) => `${k}=${JSON.stringify(v)}`).join(', ')})`
            : '()';
          A11yLog.log('ACTION', `tool: ${tc.name}`, argsStr);
        }
      }

      A11yLog.logBackendEvents(data.accessibility_events);

      if (data.reply_text) {
        A11yLog.log('AUDIO', 'tts-playback', 'Lynn speaking response aloud');
        await waitForTts(data.reply_text);
      }
    } catch (e) {
      stopThinkingEarcon();
      A11yLog.log('ERROR', 'tour-error', `Failed: ${e.message || e}`);
    }
  }

  async function triggerGreeting() {
    EarconSystem.play('greeting');
    A11yLog.log('EARCON', 'greeting', 'Warm chime signals app is alive');
    A11yLog.log('AUDIO', 'AUTO-GREET', "Lynn introduced herself — no visual context needed");

    await new Promise(r => setTimeout(r, 600));

    await waitForTts("Hi, I'm Lynn, your bunq accessibility assistant. Let me show you what I can do.");

    // Start guided tour
    tourRunning = true;
    await new Promise(r => setTimeout(r, 800));

    // Step 1: Balance check
    A11yLog.log('STATE', 'tour-step', 'Demo: checking account balance');
    await sendTextAndSpeak("What's my balance?");
    await new Promise(r => setTimeout(r, 1000));

    // Step 2: Spending overview
    A11yLog.log('STATE', 'tour-step', 'Demo: reviewing recent spending');
    await sendTextAndSpeak("What did I spend this week?");
    await new Promise(r => setTimeout(r, 1000));

    // Step 3: Send money (draft)
    A11yLog.log('STATE', 'tour-step', 'Demo: voice payment with safety readback');
    await sendTextAndSpeak("Send 5 euros to Nikki for lunch");
    await new Promise(r => setTimeout(r, 1000));

    // Wrap up
    await waitForTts("And that's just a few things I can help with. Hold anywhere on the screen to talk to me.");
    A11yLog.log('STATE', 'tour-complete', 'Guided tour finished — user can now interact freely');

    tourRunning = false;
    setVoiceState('idle');
  }

  // ── Voice Agent State ──
  let appState = 'idle';
  let pressStartedAt = 0;
  let recorder = null;
  let micStream = null;
  let audioCtx = null;
  let analyser = null;
  let micLevel = 0;
  let chunks = [];
  let abortCtrl = null;
  const MIN_HOLD_MS = 200;

  function setVoiceState(s) {
    appState = s;
    const hint = document.querySelector('.hint');
    if (hint) {
      hint.textContent = ({
        idle:      'Hold to speak',
        listening: 'Listening…',
        thinking:  'Thinking…',
        speaking:  'Speaking…',
      })[s] || 'Hold to speak';
    }
  }

  // ── Mic ──
  function startMicAnalyser(stream) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    function tick() {
      if (!analyser) return;
      analyser.getByteFrequencyData(buf);
      let sum = 0;
      for (let i = 0; i < buf.length; i++) sum += buf[i];
      micLevel = micLevel * 0.8 + (sum / buf.length / 255) * 0.2;
      requestAnimationFrame(tick);
    }
    tick();
  }

  function teardownMic() {
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx) { try { audioCtx.close(); } catch {} audioCtx = null; }
    analyser = null;
    micLevel = 0;
  }

  // ── Recording ──
  async function startRecording() {
    try {
      chunks = [];
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recorder = new MediaRecorder(micStream);
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = onRecorderStop;
      recorder.start();
      startMicAnalyser(micStream);

      EarconSystem.play('mic-on');
      A11yLog.log('EARCON', 'mic-on', 'Audio cue confirms recording started');
      A11yLog.log('STATE', 'listening', 'Lynn is listening — user is speaking');
      setVoiceState('listening');
      pressStartedAt = performance.now();
    } catch (e) {
      EarconSystem.play('error');
      A11yLog.log('ERROR', 'mic-denied', 'Microphone access denied');
      setVoiceState('idle');
    }
  }

  function endRecordingAndSend() {
    const heldFor = performance.now() - pressStartedAt;
    if (heldFor < MIN_HOLD_MS) {
      if (recorder && recorder.state !== 'inactive') {
        try { recorder.onstop = null; recorder.stop(); } catch {}
      }
      recorder = null;
      teardownMic();
      setVoiceState('idle');
      return;
    }
    if (recorder && recorder.state !== 'inactive') {
      try { recorder.stop(); } catch {}
    }
    EarconSystem.play('mic-off');
    A11yLog.log('EARCON', 'mic-off', 'Audio confirms input captured');
    teardownMic();

    thinkingOsc = EarconSystem.play('thinking');
    A11yLog.log('EARCON', 'thinking', 'Ambient tone plays while processing');
    A11yLog.log('STATE', 'thinking', 'Lynn is processing the request');
    setVoiceState('thinking');
  }

  function onRecorderStop() {
    if (appState !== 'thinking') return;
    sendAudio();
  }

  // ── Network ──
  async function sendAudio() {
    const blob = new Blob(chunks, { type: 'audio/webm' });
    const form = new FormData();
    form.append('audio', blob, 'recording.webm');
    abortCtrl = new AbortController();
    try {
      const resp = await fetch(`${BACKEND}/voice`, {
        method: 'POST',
        body: form,
        signal: abortCtrl.signal,
      });
      const data = await resp.json();
      console.log('Backend response:', data);
      stopThinkingEarcon();
      if (appState !== 'thinking') return;

      // Log what the user said
      if (data.user_text) {
        A11yLog.log('AUDIO', 'user-speech', `User said: "${data.user_text}"`);
      }

      // Log tool calls
      if (data.tool_calls && data.tool_calls.length > 0) {
        for (const tc of data.tool_calls) {
          const argsStr = Object.keys(tc.input || {}).length
            ? `(${Object.entries(tc.input).map(([k,v]) => `${k}=${JSON.stringify(v)}`).join(', ')})`
            : '()';
          A11yLog.log('ACTION', `tool: ${tc.name}`, argsStr);
        }
      }

      // Log backend accessibility events
      A11yLog.logBackendEvents(data.accessibility_events);

      // Check for success/error earcons
      const hasError = data.tool_calls?.some(tc => tc.is_error);
      const hasConfirm = data.tool_calls?.some(tc => tc.name === 'confirm_draft_payment');
      if (hasError) {
        EarconSystem.play('error');
        A11yLog.log('EARCON', 'error', 'Audio signals something went wrong');
      } else if (hasConfirm) {
        EarconSystem.play('success');
        A11yLog.log('EARCON', 'success', 'Audio confirms action completed');
      }

      // Speak the reply
      if (data.reply_text) {
        A11yLog.log('AUDIO', 'tts-playback', 'Lynn speaking response aloud');
        setVoiceState('speaking');
        const audio = await speakText(data.reply_text);
        if (audio) {
          audio.onended = () => { setVoiceState('idle'); };
        } else {
          const ms = Math.min(8000, Math.max(1200, data.reply_text.length * 50));
          setTimeout(() => { if (appState === 'speaking') setVoiceState('idle'); }, ms);
        }
      } else {
        setVoiceState('idle');
      }
    } catch (e) {
      stopThinkingEarcon();
      if (e.name === 'AbortError') return;
      EarconSystem.play('error');
      A11yLog.log('ERROR', 'network', 'Could not reach backend');
      setVoiceState('idle');
    } finally {
      abortCtrl = null;
    }
  }

  function interrupt() {
    if (abortCtrl) { try { abortCtrl.abort(); } catch {} abortCtrl = null; }
    stopTts();
    stopThinkingEarcon();
    if (recorder && recorder.state !== 'inactive') {
      try { recorder.onstop = null; recorder.stop(); } catch {}
    }
    recorder = null;
    teardownMic();
  }

  // ── Rhythm Auth ──
  const lockOverlay = document.getElementById('lockOverlay');
  const lockDots = document.getElementById('lockDots');
  const dots = lockDots.querySelectorAll('.lock-dot');

  // Secret pattern: intervals between taps in ms
  // tap-tap-pause-tap-tap (quick quick slow quick quick)
  const SECRET_RHYTHM = [300, 700, 300];
  const TOLERANCE = 250;
  const EVAL_DELAY = 1400;

  let tapTimes = [];
  let evalTimer = null;
  let locked = true;
  let authBusy = false;

  function announceAuth() {
    speakText("Tap your rhythm to unlock.");
  }

  function onAuthTap() {
    if (authBusy) return;
    const now = performance.now();
    tapTimes.push(now);

    const idx = tapTimes.length - 1;
    if (idx < dots.length) {
      dots[idx].classList.add('active');
    }

    EarconSystem.play('tap');

    clearTimeout(evalTimer);
    evalTimer = setTimeout(() => evaluateRhythm(), EVAL_DELAY);
  }

  function evaluateRhythm() {
    if (tapTimes.length < 2) {
      resetAuth();
      return;
    }

    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) {
      intervals.push(tapTimes[i] - tapTimes[i - 1]);
    }

    if (intervals.length !== SECRET_RHYTHM.length) {
      authFail();
      return;
    }

    const match = intervals.every((iv, i) =>
      Math.abs(iv - SECRET_RHYTHM[i]) <= TOLERANCE
    );

    if (match) {
      authSuccess();
    } else {
      authFail();
    }
  }

  async function authSuccess() {
    authBusy = true;
    dots.forEach(d => { d.classList.remove('active'); d.classList.add('success'); });
    EarconSystem.play('unlock');
    A11yLog.show();
    A11yLog.log('ACTION', 'auth-success', 'Rhythm pattern matched — device unlocked without visual PIN');

    await new Promise(r => setTimeout(r, 600));
    lockOverlay.classList.add('hidden');
    locked = false;
    authBusy = false;

    // Now start the normal transition flow
    await new Promise(r => setTimeout(r, 300));
    // Auto-trigger transition to voice UI
    screen.classList.add('blurred');
    await new Promise(r => setTimeout(r, 700));
    screen.classList.add('active');
    activated = true;
    triggerGreeting();
  }

  async function authFail() {
    authBusy = true;
    dots.forEach(d => { d.classList.remove('active'); d.classList.add('error'); });
    lockDots.classList.add('shake');
    EarconSystem.play('error');
    A11yLog.show();
    A11yLog.log('ERROR', 'auth-failed', 'Rhythm did not match — access denied');

    await speakText("That didn't match. Try again.");

    await new Promise(r => setTimeout(r, 600));
    lockDots.classList.remove('shake');
    resetAuth();
    authBusy = false;
  }

  function resetAuth() {
    tapTimes = [];
    dots.forEach(d => {
      d.classList.remove('active', 'error', 'success');
    });
  }

  // Announce on first interaction (needed to unlock AudioContext)
  let announced = false;

  // ── Pointer Events (Auth + Transition + Voice) ──
  const screen = document.getElementById('screen');
  let activated = false;

  screen.addEventListener('pointerdown', async (e) => {
    e.preventDefault();
    try { screen.setPointerCapture(e.pointerId); } catch {}

    if (!announced) {
      announced = true;
      announceAuth();
    }

    if (locked) {
      onAuthTap();
      return;
    }

    // Voice agent interaction (after activation)
    if (tourRunning) return;
    if (appState === 'idle') {
      await startRecording();
    } else if (appState === 'thinking' || appState === 'speaking') {
      interrupt();
      await startRecording();
    }
  });

  function onRelease(e) {
    try { screen.releasePointerCapture(e.pointerId); } catch {}
    if (activated && appState === 'listening') endRecordingAndSend();
  }
  screen.addEventListener('pointerup', onRelease);
  screen.addEventListener('pointercancel', onRelease);
  </script>

</body>
</html>
