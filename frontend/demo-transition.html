<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bunq Voice Transition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: calc(33vw - 210px);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .phone {
      position: relative;
      width: 420px;
      height: 900px;
      border-radius: 62px;
      background: #1a1a1a;
      box-shadow:
        0 0 0 2px #3a3a3a,
        0 0 0 6px #222,
        0 0 0 8px #444,
        0 40px 100px rgba(0,0,0,0.9),
        inset 0 0 0 2px #2a2a2a;
    }

    .phone::before {
      content: '';
      position: absolute;
      left: -12px; top: 140px;
      width: 5px; height: 42px;
      background: #333;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 58px 0 #333, 0 112px 0 #333;
    }
    .phone::after {
      content: '';
      position: absolute;
      right: -12px; top: 190px;
      width: 5px; height: 72px;
      background: #333;
      border-radius: 0 2px 2px 0;
    }

    .screen {
      position: absolute;
      inset: 10px;
      border-radius: 54px;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    /* ── Screenshot: transitions from sharp to blurred ── */
    .bg-screenshot {
      position: absolute;
      inset: 0;
      background-image: url('/picture/Frontend.jpeg');
      background-size: cover;
      background-position: top center;
      filter: blur(0px);
      transform: scale(1);
      transition: filter 0.7s ease, transform 0.7s ease;
    }

    .screen.blurred .bg-screenshot {
      filter: blur(10px);
      transform: scale(1.08);
    }

    /* ── Dark tint: fades in on blur ── */
    .bg-tint {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .screen.blurred .bg-tint {
      opacity: 1;
    }

    /* ── Dynamic Island ── */
    .island {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }

    /* ── Voice UI: fades in ── */
    .voice-ui {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.6s ease 0.3s;
    }

    .screen.active .voice-ui {
      opacity: 1;
    }

    .orb {
      position: relative;
      width: 130px; height: 130px;
      border-radius: 50%;
      box-shadow:
        0 0 60px rgba(236, 0, 140, 0.30),
        0 0 100px rgba(0, 174, 239, 0.25),
        0 0 140px rgba(139, 197, 63, 0.18);
      animation: breathe 3.2s ease-in-out infinite;
      overflow: hidden;
      isolation: isolate;
    }

    /* Rotating bunq conic gradient — 10 brand colors looping seamlessly */
    .orb::before {
      content: '';
      position: absolute;
      inset: -10%;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #3FA535 0%,
        #8BC53F 10%,
        #FFD500 20%,
        #F7941D 30%,
        #EF4136 40%,
        #EC008C 50%,
        #662D91 60%,
        #1B75BC 70%,
        #00AEEF 80%,
        #00A79D 90%,
        #3FA535 100%
      );
      filter: blur(3px);
      animation: orbSpin 10s linear infinite;
      z-index: 0;
    }

    /* Inner highlight for depth */
    .orb::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.12) 22%, transparent 45%),
        radial-gradient(circle at 70% 80%, rgba(0,0,0,0.18) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }

    @keyframes orbSpin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hint {
      margin-top: 20px;
      color: #00C8FF;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Lock Screen Overlay ── */
    .lock-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 54px;
      transition: opacity 0.5s ease;
    }

    .lock-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .lock-icon {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .lock-icon svg {
      width: 28px;
      height: 28px;
      fill: rgba(255,255,255,0.5);
    }

    .lock-text {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 0 40px;
    }

    .lock-dots {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .lock-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .lock-dot.active {
      background: #00C8FF;
      transform: scale(1.3);
    }

    .lock-dot.error {
      background: #EF4444;
    }

    .lock-dot.success {
      background: #22C55E;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .lock-dots.shake {
      animation: shake 0.4s ease;
    }

    /* ── Payment Auth Overlay ── */
    .pay-auth-overlay {
      position: absolute;
      inset: 0;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.9);
      border-radius: 54px;
      transition: opacity 0.4s ease;
    }

    .pay-auth-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Home bar ── */
    .home-bar {
      position: absolute;
      bottom: 12px;
      left: 50%; transform: translateX(-50%);
      width: 120px; height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      z-index: 10;
    }

    /* ── Accessibility Log Panel ── */
    .a11y-log {
      position: fixed;
      top: 40px;
      right: 40px;
      bottom: 40px;
      width: 38vw;
      background: #0a0a0a;
      border: 1px solid #1f2937;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
      pointer-events: none;
      overflow: hidden;
      font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace;
    }

    .a11y-log.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .a11y-log-header {
      padding: 16px 20px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #1f2937;
      flex-shrink: 0;
    }

    .a11y-log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .a11y-entry {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      font-size: 12.5px;
      line-height: 1.5;
      animation: fadeInEntry 0.3s ease;
    }

    @keyframes fadeInEntry {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .a11y-tag {
      flex-shrink: 0;
      font-weight: 700;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      height: fit-content;
    }

    .a11y-tag.AUDIO   { color: #00C8FF; background: rgba(0,200,255,0.1); }
    .a11y-tag.EARCON  { color: #FF3D8B; background: rgba(255,61,139,0.1); }
    .a11y-tag.SPEECH  { color: #C084FC; background: rgba(192,132,252,0.1); }
    .a11y-tag.STATE   { color: #FACC15; background: rgba(250,204,21,0.1); }
    .a11y-tag.ACTION  { color: #22C55E; background: rgba(34,197,94,0.1); }
    .a11y-tag.API     { color: #F97316; background: rgba(249,115,22,0.1); }
    .a11y-tag.ERROR   { color: #EF4444; background: rgba(239,68,68,0.1); }

    .a11y-event {
      color: #9ca3af;
      font-weight: 600;
      flex-shrink: 0;
    }

    .a11y-detail {
      color: #6b7280;
    }
  </style>
</head>

  <script>
// ── Earcon System (preloaded WAV files) ──
const EarconSystem = (() => {
  const names = ['greeting', 'mic-on', 'mic-off', 'thinking', 'success', 'error', 'tap', 'unlock'];
  const buffers = {};
  let ctx = null;
  let thinkingSource = null;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  // Preload all earcon WAVs
  async function preload() {
    const ac = getCtx();
    await Promise.all(names.map(async name => {
      try {
        const resp = await fetch(`/frontend/audio/${name}.wav`);
        const arr = await resp.arrayBuffer();
        buffers[name] = await ac.decodeAudioData(arr);
      } catch (e) {
        console.warn(`Failed to preload earcon: ${name}`, e);
      }
    }));
    console.log('Earcons preloaded:', Object.keys(buffers).join(', '));
  }

  function play(name) {
    const ac = getCtx();
    const buf = buffers[name];
    if (!buf) { console.warn('Earcon not loaded:', name); return null; }

    if (name === 'thinking') {
      // Loop the thinking earcon
      const source = ac.createBufferSource();
      source.buffer = buf;
      source.loop = true;
      source.connect(ac.destination);
      source.start();
      thinkingSource = source;
      return source;
    }

    const source = ac.createBufferSource();
    source.buffer = buf;
    source.connect(ac.destination);
    source.start();
    return source;
  }

  return { play, getCtx, preload };
})();

let thinkingOsc = null;
function stopThinkingEarcon() {
  if (thinkingOsc) {
    try { thinkingOsc.stop(); } catch {}
    thinkingOsc = null;
  }
}

// Preload earcons on page load
EarconSystem.preload();

// ── Tap Shortcuts ──
const TapShortcuts = (() => {
  const TAP_WINDOW = 400; // ms to wait before deciding tap count
  const BACKEND = 'http://localhost:8000';
  let tapCount = 0;
  let tapTimer = null;
  let enabled = false;
  let busy = false;

  function enable() { enabled = true; }
  function disable() { enabled = false; }

  function onTap() {
    if (!enabled || busy) return false;
    tapCount++;
    EarconSystem.play('tap');
    clearTimeout(tapTimer);
    if (tapCount >= 2) {
      fire(2);
      return true;
    }
    tapTimer = setTimeout(() => fire(tapCount), TAP_WINDOW);
    return true;
  }

  async function fire(count) {
    tapCount = 0;
    tapTimer = null;
    busy = true;
    const shortcuts = {
      1: { prompt: 'Tell me just the balance amount, nothing else. Be extremely brief, just the number in words.', label: 'balance' },
      2: { prompt: 'Read me my IBAN. Just the IBAN, nothing else. Read it in plain letters and digits, not the NATO phonetic alphabet.', label: 'my IBAN' },
    };
    const shortcut = shortcuts[count];
    if (!shortcut) { busy = false; return; }

    A11yLog.log('ACTION', `tap-shortcut-${count}`, `${count}-tap → quick ${shortcut.label}`);

    try {
      setVoiceState('thinking');
      thinkingOsc = EarconSystem.play('thinking');

      const form = new FormData();
      form.append('message', shortcut.prompt);
      const resp = await fetch(`${BACKEND}/text`, { method: 'POST', body: form });
      const data = await resp.json();
      stopThinkingEarcon();

      if (data.tool_calls && data.tool_calls.length > 0) {
        for (const tc of data.tool_calls) {
          const argsStr = Object.keys(tc.input || {}).length
            ? `(${Object.entries(tc.input).map(([k,v]) => `${k}=${JSON.stringify(v)}`).join(', ')})`
            : '()';
          A11yLog.log('API', tc.name, argsStr);
        }
      }
      A11yLog.logBackendEvents(data.accessibility_events);

      if (data.reply_text) {
        A11yLog.log('SPEECH', `quick-${shortcut.label}`, `"${data.reply_text}"`);
        setVoiceState('speaking');
        const audio = await speakText(data.reply_text);
        if (audio) {
          await new Promise(resolve => { audio.onended = resolve; });
        } else {
          await new Promise(r => setTimeout(r, Math.max(800, data.reply_text.length * 50)));
        }
      }
    } catch (e) {
      stopThinkingEarcon();
      A11yLog.log('ERROR', 'tap-shortcut-failed', e.message || String(e));
      EarconSystem.play('error');
    } finally {
      busy = false;
      setVoiceState('idle');
    }
  }

  return { onTap, enable, disable, TAP_WINDOW };
})();
  </script>

  <script>
const A11yLog = (() => {
  const entries = document.getElementById('a11yEntries');
  const panel = document.getElementById('a11yLog');

  function show() { panel.classList.add('visible'); }
  function hide() { panel.classList.remove('visible'); }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function log(type, event, detail) {
    const entry = document.createElement('div');
    entry.className = 'a11y-entry';
    entry.innerHTML =
      `<span class="a11y-tag ${type}">${type}</span>` +
      `<span class="a11y-event">${escapeHtml(event)}</span>` +
      `<span class="a11y-detail">${escapeHtml(detail)}</span>`;
    entries.appendChild(entry);
    entries.scrollTop = entries.scrollHeight;
  }

  function logBackendEvents(events) {
    if (!events) return;
    for (const ev of events) {
      log(ev.type, ev.event, ev.detail);
    }
  }

  return { show, hide, log, logBackendEvents };
})();
  </script>

  <script>
  // ── Config ──
  const BACKEND = 'http://localhost:8000';

  // Wipe server-side memory on every page load (hard reload included).
  fetch(`${BACKEND}/reset`, { method: 'POST' }).catch(() => {});
  const ELEVENLABS_VOICE_ID = 'gE0owC0H9C8SzfDyIUtB';
  let elevenLabsApiKey = '';

  fetch(`${BACKEND}/config`)
    .then(r => r.json())
    .then(cfg => { elevenLabsApiKey = cfg.elevenlabs_api_key; })
    .catch(() => {});

  // ── TTS ──
  let ttsAudio = null;
  let speechSpeed = 1.0; // 0.7 = slow, 1.0 = normal, 1.3 = fast
  let lastSpokenText = '';

  function setSpeechSpeed(speed) {
    speechSpeed = Math.max(0.5, Math.min(1.5, speed));
    A11yLog.log('STATE', 'speed-change', `Speech speed set to ${speechSpeed.toFixed(1)}x`);
  }

  async function speakText(text) {
    if (!text || !elevenLabsApiKey) return null;
    lastSpokenText = text;
    try {
      const resp = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`,
        {
          method: 'POST',
          headers: { 'xi-api-key': elevenLabsApiKey, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            model_id: 'eleven_multilingual_v2',
            voice_settings: { stability: 0.5, similarity_boost: 0.75 }
          })
        }
      );
      if (!resp.ok) { console.warn('ElevenLabs TTS failed:', resp.status); return null; }
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      if (ttsAudio) { try { ttsAudio.pause(); } catch {} }
      ttsAudio = new Audio(url);
      ttsAudio.playbackRate = speechSpeed;
      ttsAudio.onended = () => { URL.revokeObjectURL(url); };
      await ttsAudio.play();
      return ttsAudio;
    } catch (e) {
      console.warn('TTS error:', e);
      A11yLog.log('ERROR', 'tts-failed', `TTS error: ${e.message || e}`);
      return null;
    }
  }

  function stopTts() {
    if (ttsAudio) { try { ttsAudio.pause(); } catch {} ttsAudio = null; }
  }

  // ── Auto-Greeting + Guided Tour ──
  let tourRunning = false;

  async function waitForTts(text) {
    setVoiceState('speaking');
    const audio = await speakText(text);
    if (audio) {
      await new Promise(resolve => { audio.onended = resolve; });
    } else {
      await new Promise(r => setTimeout(r, Math.max(1500, text.length * 55)));
    }
  }

  async function sendTextAndSpeak(userMessage) {
    A11yLog.log('AUDIO', 'tour-prompt', `Demo: "${userMessage}"`);
    setVoiceState('thinking');
    thinkingOsc = EarconSystem.play('thinking');
    A11yLog.log('STATE', 'thinking', 'Lynn is processing the request');

    const form = new FormData();
    form.append('message', userMessage);
    try {
      const resp = await fetch(`${BACKEND}/text`, { method: 'POST', body: form });
      const data = await resp.json();
      console.log('Tour response:', data);
      stopThinkingEarcon();

      // Log tool calls
      if (data.tool_calls && data.tool_calls.length > 0) {
        for (const tc of data.tool_calls) {
          const argsStr = Object.keys(tc.input || {}).length
            ? `(${Object.entries(tc.input).map(([k,v]) => `${k}=${JSON.stringify(v)}`).join(', ')})`
            : '()';
          A11yLog.log('API', tc.name, argsStr);
        }
      }

      A11yLog.logBackendEvents(data.accessibility_events);
      const hadPendingTour = hasPendingDraft;
      hasPendingDraft = !!data.pending;
      if (hasPendingDraft && !hadPendingTour) paymentFlow = 'awaitingConfirmation';

      if (data.reply_text) {
        A11yLog.log('AUDIO', 'tts-playback', 'Lynn speaking response aloud');
        await waitForTts(data.reply_text);
      }
    } catch (e) {
      stopThinkingEarcon();
      A11yLog.log('ERROR', 'tour-error', `Failed: ${e.message || e}`);
    }
  }

  async function triggerGreeting() {
    EarconSystem.play('greeting');
    A11yLog.log('EARCON', 'greeting', 'Warm chime signals app is alive');
    A11yLog.log('AUDIO', 'AUTO-GREET', "Lynn introduced herself — no visual context needed");

    await new Promise(r => setTimeout(r, 600));

    await waitForTts("Hi, I'm Lynn, your bunq accessibility assistant. What can I do for you?");

    TapShortcuts.enable();
    tourRunning = false;
    setVoiceState('idle');
  }

  // ── Voice Agent State ──
  let appState = 'idle';
  let holdTimer = null;
  let pressStartedAt = 0;
  let recorder = null;
  let micStream = null;
  let audioCtx = null;
  let analyser = null;
  let micLevel = 0;
  let chunks = [];
  let abortCtrl = null;
  const MIN_HOLD_MS = 200;

  function setVoiceState(s) {
    appState = s;
    const hint = document.querySelector('.hint');
    if (hint) {
      hint.textContent = ({
        idle:      'Hold to speak',
        listening: 'Listening…',
        thinking:  'Thinking…',
        speaking:  'Speaking…',
      })[s] || 'Hold to speak';
    }
  }

  // ── Mic ──
  function startMicAnalyser(stream) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    function tick() {
      if (!analyser) return;
      analyser.getByteFrequencyData(buf);
      let sum = 0;
      for (let i = 0; i < buf.length; i++) sum += buf[i];
      micLevel = micLevel * 0.8 + (sum / buf.length / 255) * 0.2;
      requestAnimationFrame(tick);
    }
    tick();
  }

  function teardownMic() {
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (audioCtx) { try { audioCtx.close(); } catch {} audioCtx = null; }
    analyser = null;
    micLevel = 0;
  }

  // ── Recording ──
  async function startRecording() {
    try {
      chunks = [];
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recorder = new MediaRecorder(micStream);
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = onRecorderStop;
      recorder.start();
      startMicAnalyser(micStream);

      EarconSystem.play('mic-on');
      A11yLog.log('EARCON', 'mic-on', 'Audio cue confirms recording started');
      A11yLog.log('STATE', 'listening', 'Lynn is listening — user is speaking');
      setVoiceState('listening');
      pressStartedAt = performance.now();
    } catch (e) {
      EarconSystem.play('error');
      A11yLog.log('ERROR', 'mic-denied', 'Microphone access denied');
      setVoiceState('idle');
    }
  }

  function endRecordingAndSend() {
    const heldFor = performance.now() - pressStartedAt;
    if (heldFor < MIN_HOLD_MS) {
      if (recorder && recorder.state !== 'inactive') {
        try { recorder.onstop = null; recorder.stop(); } catch {}
      }
      recorder = null;
      teardownMic();
      setVoiceState('idle');
      return;
    }
    if (recorder && recorder.state !== 'inactive') {
      try { recorder.stop(); } catch {}
    }
    EarconSystem.play('mic-off');
    A11yLog.log('EARCON', 'mic-off', 'Audio confirms input captured');
    teardownMic();

    thinkingOsc = EarconSystem.play('thinking');
    A11yLog.log('EARCON', 'thinking', 'Ambient tone plays while processing');
    A11yLog.log('STATE', 'thinking', 'Lynn is processing the request');
    setVoiceState('thinking');
  }

  function onRecorderStop() {
    if (appState !== 'thinking') return;
    sendAudio();
  }

  // ── Network ──
  let hasPendingDraft = false;
  let paymentFlow = 'none'; // none → awaitingConfirmation → awaitingPasscode → (done/awaitingRetry)

  async function sendAudio() {
    const blob = new Blob(chunks, { type: 'audio/webm' });
    const form = new FormData();
    form.append('audio', blob, 'recording.webm');
    abortCtrl = new AbortController();
    try {
      // Step 1: Transcribe only
      const sttResp = await fetch(`${BACKEND}/transcribe`, {
        method: 'POST',
        body: form,
        signal: abortCtrl.signal,
      });
      const sttData = await sttResp.json();
      const userText = (sttData.text || '').trim();
      console.log('Transcribed:', userText);

      if (!userText) {
        stopThinkingEarcon();
        setVoiceState('idle');
        return;
      }

      A11yLog.log('AUDIO', 'user-speech', `User said: "${userText}"`);

      // Handle interactive voice commands client-side
      const lower = userText.toLowerCase();
      if (/^(slower|slow down|speak slower)\.?$/.test(lower)) {
        setSpeechSpeed(speechSpeed - 0.15);
        stopThinkingEarcon();
        setVoiceState('speaking');
        const audio = await speakText('Slower. Got it.');
        if (audio) audio.onended = () => setVoiceState('idle');
        else setVoiceState('idle');
        return;
      }
      if (/^(faster|speed up|speak faster)\.?$/.test(lower)) {
        setSpeechSpeed(speechSpeed + 0.15);
        stopThinkingEarcon();
        setVoiceState('speaking');
        const audio = await speakText('Faster. Got it.');
        if (audio) audio.onended = () => setVoiceState('idle');
        else setVoiceState('idle');
        return;
      }
      if (/^(repeat|say that again|again)\.?$/.test(lower) && lastSpokenText) {
        stopThinkingEarcon();
        A11yLog.log('ACTION', 'repeat', 'Repeating last response');
        setVoiceState('speaking');
        const audio = await speakText(lastSpokenText);
        if (audio) audio.onended = () => setVoiceState('idle');
        else setVoiceState('idle');
        return;
      }

      // ── Payment flow: voice commands during active payment ──
      if (paymentFlow !== 'none') {
        const isCancel = /\b(cancel|stop|never\s*mind|don't|abort)\b/i.test(lower);
        stopThinkingEarcon();

        if (isCancel) {
          paymentFlow = 'none';
          hasPendingDraft = false;
          A11yLog.log('ACTION', 'payment-cancelled', 'User cancelled the payment');
          setVoiceState('thinking');
          thinkingOsc = EarconSystem.play('thinking');
          await sendTextToLLM('cancel');
          return;
        }

        if (paymentFlow === 'awaitingRetry') {
          const isYes = /\b(yes|sure|okay|yep|yeah|try)\b/i.test(lower);
          const isNo = /\b(no|nope|nah)\b/i.test(lower);
          if (isYes) {
            paymentFlow = 'awaitingPasscode';
            A11yLog.log('STATE', 'pay-auth-retry', 'User wants to retry passcode');
            setVoiceState('speaking');
            await waitForTts('Enter your passcode.');
            setVoiceState('idle');
            requestPaymentAuth();
          } else if (isNo) {
            paymentFlow = 'none';
            hasPendingDraft = false;
            A11yLog.log('ACTION', 'payment-cancelled', 'User declined retry — payment cancelled');
            setVoiceState('thinking');
            thinkingOsc = EarconSystem.play('thinking');
            await sendTextToLLM('cancel');
          } else {
            setVoiceState('speaking');
            await waitForTts('Want to try the passcode again? Say yes or no.');
            setVoiceState('idle');
          }
          return;
        }

        // awaitingConfirmation or awaitingPasscode — remind user to tap
        if (paymentFlow === 'awaitingConfirmation') {
          setVoiceState('speaking');
          await waitForTts('Tap once to confirm, twice to cancel.');
          setVoiceState('idle');
          return;
        }
        if (paymentFlow === 'awaitingPasscode') {
          setVoiceState('speaking');
          await waitForTts('Tap your passcode on the screen.');
          setVoiceState('idle');
          return;
        }
      }

      // Step 2: Send text to LLM
      await sendTextToLLM(userText);
    } catch (e) {
      stopThinkingEarcon();
      if (e.name === 'AbortError') return;
      EarconSystem.play('error');
      A11yLog.log('ERROR', 'network', 'Could not reach backend');
      setVoiceState('idle');
    } finally {
      abortCtrl = null;
    }
  }

  async function sendTextToLLM(text) {
    const form = new FormData();
    form.append('message', text);
    try {
      const resp = await fetch(`${BACKEND}/text`, { method: 'POST', body: form });
      const data = await resp.json();
      console.log('Backend response:', data);
      stopThinkingEarcon();

      // Track pending draft state — enter payment flow when draft is created
      const hadPending = hasPendingDraft;
      hasPendingDraft = !!data.pending;
      if (hasPendingDraft && !hadPending) {
        paymentFlow = 'awaitingConfirmation';
        A11yLog.log('STATE', 'payment-flow', 'Draft created — entering payment confirmation flow');
      }

      // Log tool calls
      if (data.tool_calls && data.tool_calls.length > 0) {
        for (const tc of data.tool_calls) {
          const argsStr = Object.keys(tc.input || {}).length
            ? `(${Object.entries(tc.input).map(([k,v]) => `${k}=${JSON.stringify(v)}`).join(', ')})`
            : '()';
          A11yLog.log('API', tc.name, argsStr);
        }
      } else {
        A11yLog.log('STATE', 'no-api-call', 'Lynn answered from memory — no bunq API call needed');
      }

      // Log backend accessibility events
      A11yLog.logBackendEvents(data.accessibility_events);

      // Check for success/error earcons
      const hasError = data.tool_calls?.some(tc => tc.is_error);
      const hasConfirm = data.tool_calls?.some(tc => tc.name === 'confirm_draft_payment');
      if (hasError) {
        EarconSystem.play('error');
        A11yLog.log('EARCON', 'error', 'Audio signals something went wrong');
      } else if (hasConfirm) {
        EarconSystem.play('success');
        A11yLog.log('EARCON', 'success', 'Audio confirms payment completed');
        hasPendingDraft = false;
        paymentFlow = 'none';
      }

      // Speak the reply
      if (data.reply_text) {
        A11yLog.log('AUDIO', 'tts-playback', 'Lynn speaking response aloud');
        setVoiceState('speaking');
        const audio = await speakText(data.reply_text);
        if (audio) {
          audio.onended = () => { setVoiceState('idle'); };
        } else {
          const ms = Math.min(8000, Math.max(1200, data.reply_text.length * 50));
          setTimeout(() => { if (appState === 'speaking') setVoiceState('idle'); }, ms);
        }
      } else {
        setVoiceState('idle');
      }
    } catch (e) {
      stopThinkingEarcon();
      EarconSystem.play('error');
      A11yLog.log('ERROR', 'network', 'Could not reach backend');
      setVoiceState('idle');
    }
  }

  function interrupt() {
    if (abortCtrl) { try { abortCtrl.abort(); } catch {} abortCtrl = null; }
    stopTts();
    stopThinkingEarcon();
    if (recorder && recorder.state !== 'inactive') {
      try { recorder.onstop = null; recorder.stop(); } catch {}
    }
    recorder = null;
    teardownMic();
  }

  // ── Rhythm Auth ──
  const lockOverlay = document.getElementById('lockOverlay');
  const lockDots = document.getElementById('lockDots');
  const dots = lockDots.querySelectorAll('.lock-dot');

  // Secret pattern: tap-tap-PAUSE-tap-tap
  // We check: 4 taps, and the middle gap is at least 1.8x longer than the average of the quick gaps
  const EXPECTED_TAPS = 4;
  const PAUSE_RATIO = 1.8;
  const EVAL_DELAY = 1400;

  let tapTimes = [];
  let evalTimer = null;
  let locked = true;
  let authBusy = false;

  function announceAuth() {
    speakText("Tap your rhythm to unlock.");
  }

  function onAuthTap() {
    if (authBusy) return;
    const now = performance.now();
    tapTimes.push(now);

    const idx = tapTimes.length - 1;
    if (idx < dots.length) {
      dots[idx].classList.add('active');
    }

    clearTimeout(evalTimer);
    evalTimer = setTimeout(() => evaluateRhythm(), EVAL_DELAY);
  }

  function evaluateRhythm() {
    if (tapTimes.length !== EXPECTED_TAPS) {
      authFail();
      return;
    }

    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) {
      intervals.push(tapTimes[i] - tapTimes[i - 1]);
    }

    // Pattern: [quick, slow, quick] — the middle interval should be notably longer
    const quick1 = intervals[0];
    const pause = intervals[1];
    const quick2 = intervals[2];
    const avgQuick = (quick1 + quick2) / 2;

    if (pause > avgQuick * PAUSE_RATIO && quick1 < 800 && quick2 < 800) {
      authSuccess();
    } else {
      authFail();
    }
  }

  async function authSuccess() {
    authBusy = true;
    dots.forEach(d => { d.classList.remove('active'); d.classList.add('success'); });
    EarconSystem.play('unlock');
    A11yLog.show();
    A11yLog.log('ACTION', 'auth-success', 'Rhythm pattern matched — device unlocked without visual PIN');

    await new Promise(r => setTimeout(r, 600));
    lockOverlay.classList.add('hidden');
    locked = false;
    authBusy = false;
    TapShortcuts.enable();

    // Screen is already blurred from demo stage 1 — just activate voice UI
    await new Promise(r => setTimeout(r, 300));
    screen.classList.add('active');
    activated = true;
    triggerGreeting();
  }

  async function authFail() {
    authBusy = true;
    dots.forEach(d => { d.classList.remove('active'); d.classList.add('error'); });
    lockDots.classList.add('shake');
    EarconSystem.play('error');
    A11yLog.show();
    A11yLog.log('ERROR', 'auth-failed', 'Rhythm did not match — access denied');

    await speakText("That didn't match. Try again.");

    await new Promise(r => setTimeout(r, 600));
    lockDots.classList.remove('shake');
    resetAuth();
    authBusy = false;
  }

  function resetAuth() {
    tapTimes = [];
    dots.forEach(d => {
      d.classList.remove('active', 'error', 'success');
    });
  }

  // ── Payment Auth (reuses rhythm pattern for payment confirmation) ──
  const payAuthOverlay = document.getElementById('payAuthOverlay');
  const payAuthDots = document.getElementById('payAuthDots');
  const payDots = payAuthDots.querySelectorAll('.lock-dot');

  let payAuthActive = false;
  let payAuthBusy = false;
  let payTapTimes = [];
  let payEvalTimer = null;

  function requestPaymentAuth() {
    payAuthActive = true;
    payAuthBusy = false;
    payTapTimes = [];
    payDots.forEach(d => d.classList.remove('active', 'error', 'success'));
    payAuthDots.classList.remove('shake');
    payAuthOverlay.classList.remove('hidden');
    A11yLog.log('STATE', 'pay-auth', 'Payment passcode overlay shown — tap rhythm to authorize');
  }

  function onPayAuthTap() {
    if (payAuthBusy) return;
    const now = performance.now();
    payTapTimes.push(now);
    const idx = payTapTimes.length - 1;
    if (idx < payDots.length) payDots[idx].classList.add('active');
    clearTimeout(payEvalTimer);
    payEvalTimer = setTimeout(() => evaluatePayAuth(), EVAL_DELAY);
  }

  function evaluatePayAuth() {
    if (payTapTimes.length !== EXPECTED_TAPS) {
      payAuthFailed();
      return;
    }
    const intervals = [];
    for (let i = 1; i < payTapTimes.length; i++) {
      intervals.push(payTapTimes[i] - payTapTimes[i - 1]);
    }
    const quick1 = intervals[0], pause = intervals[1], quick2 = intervals[2];
    const avgQuick = (quick1 + quick2) / 2;

    if (pause > avgQuick * PAUSE_RATIO && quick1 < 800 && quick2 < 800) {
      payAuthSucceeded();
    } else {
      payAuthFailed();
    }
  }

  async function payAuthSucceeded() {
    payAuthBusy = true;
    payDots.forEach(d => { d.classList.remove('active'); d.classList.add('success'); });
    EarconSystem.play('unlock');
    A11yLog.log('ACTION', 'pay-auth-success', 'Passcode matched — authorizing payment');

    await new Promise(r => setTimeout(r, 500));
    payAuthOverlay.classList.add('hidden');
    payAuthActive = false;
    payAuthBusy = false;
    paymentFlow = 'none';

    // Now actually confirm the payment
    setVoiceState('thinking');
    thinkingOsc = EarconSystem.play('thinking');
    await sendTextToLLM('confirm');
  }

  async function payAuthFailed() {
    payAuthBusy = true;
    payDots.forEach(d => { d.classList.remove('active'); d.classList.add('error'); });
    payAuthDots.classList.add('shake');
    EarconSystem.play('error');
    A11yLog.log('ERROR', 'pay-auth-failed', 'Passcode did not match');

    await new Promise(r => setTimeout(r, 400));
    payAuthOverlay.classList.add('hidden');
    payAuthActive = false;
    payAuthBusy = false;

    // Ask if they want to retry instead of auto-cancelling
    paymentFlow = 'awaitingRetry';
    setVoiceState('speaking');
    await waitForTts("That didn't match. Want to try again?");
    A11yLog.log('STATE', 'pay-auth-retry-prompt', 'Asking user if they want to retry passcode');
    setVoiceState('idle');
  }

  // Demo flow: tap 1 = blur, tap 2 = lock screen, then rhythm auth
  let audioUnlocked = false;
  let demoStage = 0; // 0 = sharp screenshot, 1 = blurred, 2 = lock screen shown

  // Hide lock overlay initially — user sees the clean app screenshot first
  lockOverlay.classList.add('hidden');

  // ── Pointer Events (Auth + Transition + Voice) ──
  const screen = document.getElementById('screen');
  let activated = false;

  screen.addEventListener('pointerdown', async (e) => {
    e.preventDefault();
    try { screen.setPointerCapture(e.pointerId); } catch {}

    // First tap: unlock AudioContext
    if (!audioUnlocked) {
      audioUnlocked = true;
      EarconSystem.getCtx();
    }

    if (locked) {
      if (demoStage === 0) {
        // Tap 1: blur the screenshot — "this is how the app looks for visually impaired people"
        demoStage = 1;
        screen.classList.add('blurred');
        return;
      }
      if (demoStage === 1) {
        // Tap 2: show lock screen on top of blur
        demoStage = 2;
        lockOverlay.classList.remove('hidden');
        announceAuth();
        return;
      }
      // Tap 3+: rhythm auth
      onAuthTap();
      return;
    }

    // Payment authorization rhythm
    if (payAuthActive) {
      onPayAuthTap();
      return;
    }

    // Voice agent interaction (after activation)
    if (tourRunning) return;

    // Payment confirmation: taps only, no recording
    if (paymentFlow === 'awaitingConfirmation') {
      // Mark this as a confirm-tap press — release handler will count it
      confirmPressTime = performance.now();
      return;
    }

    pressStartedAt = performance.now();

    // Normal mode: hold = record, quick release = tap shortcut
    if (appState === 'idle') {
      clearTimeout(holdTimer);
      holdTimer = setTimeout(async () => {
        holdTimer = null;
        if (appState === 'idle') await startRecording();
      }, TapShortcuts.TAP_WINDOW || 420);
    } else if (appState === 'thinking' || appState === 'speaking') {
      interrupt();
      clearTimeout(holdTimer);
      holdTimer = setTimeout(async () => {
        holdTimer = null;
        await startRecording();
      }, TapShortcuts.TAP_WINDOW || 420);
    }
  });

  let confirmTapCount = 0;
  let confirmTapTimer = null;
  let confirmPressTime = 0;

  async function handleConfirmTaps(count) {
    confirmTapCount = 0;
    confirmTapTimer = null;
    if (count === 1) {
      paymentFlow = 'awaitingPasscode';
      A11yLog.log('ACTION', 'tap-confirm', 'Single tap — confirmed, passcode required');
      setVoiceState('speaking');
      await waitForTts('Enter your passcode to authorize.');
      setVoiceState('idle');
      requestPaymentAuth();
    } else {
      paymentFlow = 'none';
      hasPendingDraft = false;
      A11yLog.log('ACTION', 'tap-cancel', 'Double tap — payment cancelled');
      setVoiceState('thinking');
      thinkingOsc = EarconSystem.play('thinking');
      await sendTextToLLM('cancel');
    }
  }

  function onRelease(e) {
    try { screen.releasePointerCapture(e.pointerId); } catch {}

    // Payment confirmation taps
    if (paymentFlow === 'awaitingConfirmation' && confirmPressTime > 0) {
      confirmPressTime = 0;
      confirmTapCount++;
      EarconSystem.play('tap');
      clearTimeout(confirmTapTimer);
      if (confirmTapCount >= 2) {
        handleConfirmTaps(2);
      } else {
        confirmTapTimer = setTimeout(() => handleConfirmTaps(confirmTapCount), 400);
      }
      return;
    }

    if (activated && appState === 'listening') {
      endRecordingAndSend();
    } else if (holdTimer) {
      // Quick release = tap (not a hold)
      clearTimeout(holdTimer);
      holdTimer = null;
      if (activated && appState === 'idle' && paymentFlow === 'none') {
        TapShortcuts.onTap();
      }
    }
  }
  screen.addEventListener('pointerup', onRelease);
  screen.addEventListener('pointercancel', onRelease);
  </script>

</body>
</html>
