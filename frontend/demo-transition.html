<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bunq Voice Transition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: calc(33vw - 210px);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .phone {
      position: relative;
      width: 420px;
      height: 900px;
      border-radius: 62px;
      background: #1a1a1a;
      box-shadow:
        0 0 0 2px #3a3a3a,
        0 0 0 6px #222,
        0 0 0 8px #444,
        0 40px 100px rgba(0,0,0,0.9),
        inset 0 0 0 2px #2a2a2a;
    }

    .phone::before {
      content: '';
      position: absolute;
      left: -12px; top: 140px;
      width: 5px; height: 42px;
      background: #333;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 58px 0 #333, 0 112px 0 #333;
    }
    .phone::after {
      content: '';
      position: absolute;
      right: -12px; top: 190px;
      width: 5px; height: 72px;
      background: #333;
      border-radius: 0 2px 2px 0;
    }

    .screen {
      position: absolute;
      inset: 10px;
      border-radius: 54px;
      overflow: hidden;
      background: #000;
      cursor: pointer;
    }

    /* ── Screenshot: transitions from sharp to blurred ── */
    .bg-screenshot {
      position: absolute;
      inset: 0;
      background-image: url('../picture/Frontend.jpeg');
      background-size: cover;
      background-position: top center;
      filter: blur(0px);
      transform: scale(1);
      transition: filter 0.7s ease, transform 0.7s ease;
    }

    .screen.blurred .bg-screenshot {
      filter: blur(10px);
      transform: scale(1.08);
    }

    /* ── Dark tint: fades in on blur ── */
    .bg-tint {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .screen.blurred .bg-tint {
      opacity: 1;
    }

    /* ── Dynamic Island ── */
    .island {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }

    /* ── Voice UI: fades in ── */
    .voice-ui {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.6s ease 0.3s;
    }

    .screen.active .voice-ui {
      opacity: 1;
    }

    .orb {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #00C8FF, #7c3aed);
      box-shadow:
        0 0 50px rgba(0, 200, 255, 0.55),
        0 0 100px rgba(124, 58, 237, 0.35);
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }

    .hint {
      margin-top: 20px;
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Home bar ── */
    .home-bar {
      position: absolute;
      bottom: 12px;
      left: 50%; transform: translateX(-50%);
      width: 120px; height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="phone">
    <div class="screen" id="screen">
      <div class="bg-screenshot"></div>
      <div class="bg-tint"></div>
      <div class="island"></div>
      <div class="voice-ui">
        <div class="orb"></div>
        <div class="hint">Hold to speak</div>
      </div>
      <div class="home-bar"></div>
    </div>
  </div>

  <script>
    const screen = document.getElementById('screen');
    let state = 0;
    screen.addEventListener('click', () => {
      state = (state + 1) % 3;
      screen.classList.toggle('blurred', state >= 1);
      screen.classList.toggle('active',  state >= 2);
    });
  </script>

</body>
</html>
